(function() {
  const allReversed = TRADES.slice().reverse();
  let currentFilter = 'all';

  function getFiltered() {
    return allReversed.filter(function(t) {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'win') return t.pl > 0;
      if (currentFilter === 'loss') return t.pl <= 0;
      if (currentFilter === 'BUY') return t.tp === 'BUY';
      if (currentFilter === 'SELL') return t.tp === 'SELL';
      return true;
    });
  }

  function render() {
    const filtered = getFiltered();
    const tbody = document.getElementById('historyBody');
    let html = '';
    filtered.forEach(function(t, i) {
      const win = t.pl > 0;
      const USD_JPY = 153.506;
      const plJpy = Math.round(t.pl * USD_JPY);
      const plStr = (plJpy >= 0 ? '+¥' : '-¥') + Math.abs(plJpy).toLocaleString('ja-JP');
      html += '<tr class="' + (win ? 'tr-win' : 'tr-loss') + '">' +
        '<td class="no-num">' + (i + 1) + '</td>' +
        '<td>' + t.ot + '</td>' +
        '<td class="sy">' + t.sy + '</td>' +
        '<td class="' + (t.tp === 'BUY' ? 'buy' : 'sell') + '">' + t.tp + '</td>' +
        '<td>' + t.lot + '</td>' +
        '<td>' + t.op + '</td>' +
        '<td>' + t.cp + '</td>' +
        '<td class="pl ' + (win ? 'pos' : 'neg') + '">' + plStr + '</td>' +
        '</tr>';
    });
    tbody.innerHTML = html;
    document.getElementById('showCount').textContent = filtered.length;
  }

  // Summary stats
  const total = TRADES.length;
  const wins = TRADES.filter(function(t) { return t.pl > 0; }).length;
  const losses = total - wins;
  const sumPL = TRADES.reduce(function(acc, t) { return acc + t.pl; }, 0);
  document.getElementById('totalCount').textContent = total + '件';
  document.getElementById('winCount').textContent = wins + '件';
  document.getElementById('lossCount').textContent = losses + '件';
  document.getElementById('winRate').textContent = (wins / total * 100).toFixed(1) + '%';
  const USD_JPY = 153.506;
  const sumPLjpy = Math.round(sumPL * USD_JPY);
  document.getElementById('totalPL').textContent = (sumPLjpy >= 0 ? '+¥' : '-¥') + Math.abs(sumPLjpy).toLocaleString('ja-JP');

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      render();
    });
  });

  render();
})();
</script>
