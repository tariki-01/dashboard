      gap: 4px;

      border-radius: 12px;
      padding: 5px;
      box-shadow: var(--shadow);
      width: fit-content;
      margin-bottom: 20px;

const DAYS_JP   = ["æ—¥","æœˆ","ç«","æ°´","æœ¨","é‡‘","åœŸ"];
const MONTHS_JP = ["1æœˆ","2æœˆ","3æœˆ","4æœˆ","5æœˆ","6æœˆ","7æœˆ","8æœˆ","9æœˆ","10æœˆ","11æœˆ","12æœˆ"];

/* â”€â”€ ãƒ˜ãƒ«ãƒ‘ãƒ¼ â”€â”€ */
const closeDate = t => t.closeTime.split(" ")[0];

function net(t){ return t.profit + t.commission + t.swap; }

function calcStats(trades){
  const wins   = trades.filter(t => net(t) > 0);
  const losses = trades.filter(t => net(t) <= 0);
  const total  = trades.reduce((s,t) => s + net(t), 0);
  return {
    count   : trades.length,
    wins    : wins.length,
    losses  : losses.length,
    winRate : trades.length ? (wins.length / trades.length * 100).toFixed(1) : "0.0",
    profit  : total
  };
}

function lastBalance(trades){
  return trades.length ? trades[trades.length - 1].balance : 0;
}

function fmtCurr(v, alwaysSign = true){
  const sign = v > 0 ? (alwaysSign ? "+" : "") : v < 0 ? "âˆ’" : "";
  return sign + "$" + Math.abs(v).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtShort(v){
  const abs = Math.abs(v);
  const s   = v >= 0 ? "+" : "âˆ’";
  if(abs >= 1000000) return s + "$" + (abs/1000000).toFixed(2) + "M";
  if(abs >= 1000)    return s + "$" + (abs/1000).toFixed(2) + "K";
  return s + "$" + abs.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtBal(v){
  return "$" + v.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* â”€â”€ ã‚°ãƒ«ãƒ¼ãƒ—åŒ– â”€â”€ */
function groupByDay(){
  const map = new Map();
  TRADES.forEach(t => {
    const d   = closeDate(t);
    if(!map.has(d)) map.set(d, []);
    map.get(d).push(t);
  });
  return [...map.entries()].sort((a,b)=>a[0]<b[0]?-1:1).map(([k,trades])=>{
    const d   = new Date(k);
    const lbl = `${d.getFullYear()}å¹´${d.getMonth()+1}æœˆ${d.getDate()}æ—¥ï¼ˆ${DAYS_JP[d.getDay()]}ï¼‰`;
    return { key:k, label:lbl, trades };
  });
}

function mondayOf(dateStr){
  const d = new Date(dateStr);
  const dw = d.getDay();                     // 0=Sun
  const diff = dw === 0 ? -6 : 1 - dw;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function groupByWeek(){
  const map = new Map();
  TRADES.forEach(t => {
    const mon = mondayOf(closeDate(t));
    if(!map.has(mon)) map.set(mon, []);
    map.get(mon).push(t);
  });
  return [...map.entries()].sort((a,b)=>a[0]<b[0]?-1:1).map(([mon, trades])=>{
    const m = new Date(mon);
    const s = new Date(m); s.setDate(m.getDate() + 6);
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}ï¼ˆ${DAYS_JP[d.getDay()]}ï¼‰`;
    const lbl = `${m.getFullYear()}òºt  ${fmt(m)} ã€œ ${fmt(s)}`;
    return { key:mon, label:lbl, trades };
  });
}

function groupByMonth(){
  const map = new Map();
  TRADES.forEach(t => {
    const ym = closeDate(t).slice(0,7);
    if(!map.has(ym)) map.set(ym, []);
    map.get(ym).push(t);
  });
  return [...map.entries()].sort((a,b)=>a[0]<b[0]?-1:1).map(([ym, trades])=>{
    const [y,m] = ym.split("-");
    return { key:ym, label:`${y}å¹´ ${MONTHS_JP[+m-1]}`, trades };
  });
}

function groupByYear(){
  const map = new Map();
  TRADES.forEach(t => {
    const y = closeDate(t).slice(0,4);
    if(!map.has(y)) map.set(y, []);
    map.get(y).push(t);
  });
  return [...map.entries()].sort((a,b)=>a[0]<b[0]?-1:1).map(([y, trades])=>{
    return { key:y, label:`${y}å¹´`, trades };
  });
}
